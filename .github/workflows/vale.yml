name: Vale Linter
on:
  push:
    branches: [main]
jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get centralised Vale config
        run: |
          git clone https://github.com/marieleklering/vale-config.git .vale-central
          mkdir -p .vale/styles
          cp -r .vale-central/styles/. .vale/styles/

      - name: Install Vale
        run: |
          wget https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz
          tar -xvzf vale_3.15.1_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/vale

      - name: Sync styles
        run: vale sync --config=.vale.ini

      - name: Run Vale
        run: vale --output=line --config=.vale.ini .
