name: Vale Linter

on:
    push:
        branches: [main]

jobs:
    vale:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Vale
              run: |
                  wget https://github.com/errata-ai/vale/releases/download/v3.7.0/vale_3.7.0_Linux_64-bit.tar.gz
                  tar -xvzf vale_3.7.0_Linux_64-bit.tar.gz
                  sudo mv vale /usr/local/bin/vale

            - name: Sync styles
              run: vale sync --config=.vale.ini

            - name: Run Vale
              run: vale --output=line --config=.vale.ini .
